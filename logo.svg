<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A86B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0C040;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle subtle -->
  <circle cx="150" cy="150" r="130" fill="#040810" opacity="0.95"/>

  <!-- Outer hexagon -->
  <polygon points="150,22 258,82 258,218 150,278 42,218 42,82"
           fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

  <!-- Middle hexagon (rotated) -->
  <polygon points="150,48 234,96 234,204 150,252 66,204 66,96"
           fill="none" stroke="#00D4FF" stroke-width="0.8" opacity="0.25"/>

  <!-- Corner circuit dots -->
  <circle cx="150" cy="22" r="4" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="258" cy="82" r="4" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="258" cy="218" r="4" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="150" cy="278" r="4" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="42" cy="218" r="4" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="42" cy="82" r="4" fill="#00D4FF" filter="url(#glow)"/>

  <!-- Circuit lines from corners -->
  <line x1="150" y1="22" x2="150" y2="42" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="258" y1="82" x2="244" y2="90" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="258" y1="218" x2="244" y2="210" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="278" x2="150" y2="258" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="218" x2="56" y2="210" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="82" x2="56" y2="90" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>

  <!-- K letterform - main vertical stroke -->
  <rect x="96" y="90" width="18" height="120" fill="url(#cyanGrad)" rx="2" filter="url(#glow)"/>

  <!-- K upper diagonal arm -->
  <polygon points="114,150 190,90 212,90 136,150" fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- K lower diagonal arm -->
  <polygon points="114,150 190,210 212,210 136,154" fill="url(#cyanGrad)" filter="url(#glow)"/>

  <!-- Arrow tip accent on upper arm -->
  <polygon points="212,90 224,96 216,104" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Arrow tip accent on lower arm -->
  <polygon points="212,210 224,204 216,196" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Center node dot -->
  <circle cx="125" cy="150" r="6" fill="url(#goldGrad)" filter="url(#softGlow)"/>

  <!-- Small accent dots on K arms -->
  <circle cx="160" cy="116" r="3" fill="#00D4FF" opacity="0.7"/>
  <circle cx="160" cy="184" r="3" fill="#00D4FF" opacity="0.7"/>

  <!-- Subtle scan line across K -->
  <line x1="90" y1="150" x2="220" y2="150" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>

</svg>
